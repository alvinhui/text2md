<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text2MD - 双向转换工具</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <style>
    :root {
      --bg: #f2f4f8;
      --panel-bg: #ffffff;
      --text: #1f2937;
      --subtext: #6b7280;
      --border: #e6e8eb;
      --primary: #2f6bff;
      --primary-hover: #2458d9;
      --radius: 12px;
      --shadow: 0 6px 20px rgba(15, 23, 42, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #f8faff 0%, var(--bg) 50%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .container {
      width: min(980px, calc(100vw - 28px));
      padding: 24px 0;
    }

    .header {
      text-align: center;
      margin-bottom: 18px;
    }

    .title {
      margin: 0;
      font-size: clamp(28px, 4vw, 40px);
      letter-spacing: 0.5px;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--subtext);
      font-size: 14px;
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .card {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: #cfd6e2;
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.08);
    }

    .card-tag {
      display: inline-block;
      font-size: 11px;
      line-height: 20px;
      height: 20px;
      padding: 0 8px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3856d6;
      margin-bottom: 10px;
    }

    .card-title {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    .card-desc {
      margin: 8px 0 0;
      color: var(--subtext);
      font-size: 13px;
      line-height: 1.7;
    }

    .card-action {
      margin-top: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 30px;
      padding: 0 12px;
      border-radius: 7px;
      background: var(--primary);
      color: #fff;
      font-size: 12px;
    }

    .card:hover .card-action {
      background: var(--primary-hover);
    }

    .foot {
      margin-top: 12px;
      text-align: center;
      color: #98a1b2;
      font-size: 12px;
    }

    @media (max-width: 860px) {
      .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <header class="header">
      <h1 class="title">Text2MD 双向转换工具</h1>
      <p class="subtitle">在富文本与 Markdown 之间快速转换，保持结构、表格与代码样式。</p>
    </header>

    <section class="cards">
      <a class="card" href="./rt2md.html">
        <span class="card-tag">入口 01</span>
        <h2 class="card-title">富文本 -> Markdown</h2>
        <p class="card-desc">适合将网页、文档、富文本编辑内容快速提取为可复制的 Markdown 源码。</p>
        <span class="card-action">进入工具</span>
      </a>

      <a class="card" href="./md2rt.html">
        <span class="card-tag">入口 02</span>
        <h2 class="card-title">Markdown -> 富文本</h2>
        <p class="card-desc">适合将 Markdown 实时渲染为可编辑富文本，支持表格与行内代码样式展示。</p>
        <span class="card-action">进入工具</span>
      </a>
    </section>

    <p class="foot">建议将此页作为产品 Landing，并通过顶部导航在两个工具间切换。</p>
  </main>
</body>
</html>
