<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown -> 富文本</title>
  <style>
    :root {
      --bg: #f2f4f8;
      --panel-bg: #ffffff;
      --text: #262626;
      --subtext: #6b7280;
      --border: #e6e8eb;
      --primary: #2f6bff;
      --primary-hover: #2458d9;
      --radius: 10px;
      --shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
      --muted-bg: #f7f8fa;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .container {
      width: min(1360px, calc(100vw - 28px));
      margin: 14px auto 24px;
    }

    h1 {
      margin: 0 0 12px;
      text-align: center;
      font-size: clamp(20px, 2.1vw, 30px);
      font-weight: 600;
      color: #1f2937;
    }

    .mode-switch {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 0 0 12px;
    }

    .mode-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border: 1px solid #d8dde8;
      background: #f6f7fa;
      color: #4b5563;
      border-radius: 999px;
      height: 34px;
      padding: 0 16px;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .mode-btn:hover { background: #eceff5; }
    .mode-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      box-shadow: 0 2px 8px rgba(47, 107, 255, 0.25);
    }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .panel {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      height: 44px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px 0 12px;
      background: #fafbfc;
    }

    .panel-title {
      font-size: 13px;
      color: var(--subtext);
      font-weight: 500;
    }

    .btn {
      border: 1px solid transparent;
      border-radius: 7px;
      background: var(--primary);
      color: #fff;
      font-size: 12px;
      line-height: 28px;
      height: 28px;
      padding: 0 10px;
      cursor: pointer;
    }

    .btn:hover { background: var(--primary-hover); }

    .btn-light {
      background: #6b7280;
    }
    .btn-light:hover {
      background: #4b5563;
    }

    .md-input-wrap,
    .rich-wrap {
      height: min(74vh, 760px);
    }

    .md-toolbar {
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      flex-wrap: wrap;
      background: var(--muted-bg);
      border-bottom: 1px solid var(--border);
    }

    .md-tool-btn {
      border: 1px solid #dde2ea;
      background: #fff;
      color: #374151;
      border-radius: 6px;
      height: 26px;
      padding: 0 9px;
      font-size: 12px;
      cursor: pointer;
    }

    .md-tool-btn:hover {
      background: #f3f4f6;
      border-color: #cfd6e2;
    }

    #markdownInput {
      margin: 0;
      width: 100%;
      height: calc(100% - 42px);
      border: 0;
      outline: none;
      resize: none;
      padding: 18px 20px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
        "Liberation Mono", "Courier New", monospace;
      font-size: 14px;
      line-height: 1.8;
      background: #fcfcfd;
      color: #111827;
      overflow: auto;
      white-space: pre;
    }

    #richOutputEditor {
      height: 100%;
      overflow: auto;
      padding: 20px 22px;
      font-size: 16px;
      line-height: 1.85;
      color: #111827;
      outline: none;
      background: #fff;
    }

    #richOutputEditor h1,
    #richOutputEditor h2,
    #richOutputEditor h3,
    #richOutputEditor h4,
    #richOutputEditor h5,
    #richOutputEditor h6,
    #richOutputEditor p,
    #richOutputEditor ul,
    #richOutputEditor ol,
    #richOutputEditor blockquote {
      max-width: 860px;
      margin: 0 auto 14px;
    }

    #richOutputEditor li,
    #richOutputEditor table,
    #richOutputEditor pre,
    #richOutputEditor hr {
      max-width: 860px;
      margin-left: auto;
      margin-right: auto;
    }

    #richOutputEditor ul,
    #richOutputEditor ol {
      padding-left: 24px;
    }

    #richOutputEditor pre {
      background: #0f172a;
      color: #e2e8f0;
      padding: 14px;
      border-radius: 8px;
      overflow: auto;
      margin-bottom: 14px;
      font-size: 13px;
    }

    #richOutputEditor code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
        "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      background: #f3f4f6;
      color: #374151;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      padding: 1px 5px;
    }

    #richOutputEditor pre code {
      background: transparent;
      color: inherit;
      border: 0;
      border-radius: 0;
      padding: 0;
    }

    #richOutputEditor blockquote {
      border-left: 3px solid #d4d8df;
      padding: 8px 12px;
      background: #fafbfc;
      color: #4b5563;
    }

    #richOutputEditor a { color: #2563eb; }
    #richOutputEditor img { max-width: 100%; height: auto; }
    #richOutputEditor hr {
      border: 0;
      border-top: 1px solid #e2e8f0;
      margin: 14px auto;
    }

    #richOutputEditor table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px auto;
      table-layout: fixed;
      font-size: 14px;
    }

    #richOutputEditor th,
    #richOutputEditor td {
      border: 1px solid #e5e7eb;
      padding: 8px 12px;
      vertical-align: top;
      word-break: break-word;
    }

    #richOutputEditor thead th {
      background: #f7f8fa;
      font-weight: 600;
    }

    #richOutputEditor tbody tr:nth-child(even) {
      background: #fafcff;
    }

    .tip {
      margin-top: 8px;
      text-align: center;
      color: #98a1b2;
      font-size: 12px;
    }

    @media (max-width: 980px) {
      .panels { grid-template-columns: 1fr; }
      .md-input-wrap, .rich-wrap { height: 48vh; }
      #richOutputEditor h1,
      #richOutputEditor h2,
      #richOutputEditor h3,
      #richOutputEditor p,
      #richOutputEditor ul,
      #richOutputEditor ol,
      #richOutputEditor blockquote,
      #richOutputEditor li,
      #richOutputEditor table,
      #richOutputEditor pre,
      #richOutputEditor hr {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>富文本与Markdown在线双向转换工具</h1>
    <div class="mode-switch">
      <a class="mode-btn" href="./rt2md.html">富文本 -> Markdown</a>
      <a class="mode-btn active" href="./md2rt.html">Markdown -> 富文本</a>
    </div>

    <section class="panels">
      <article class="panel">
        <header class="panel-header">
          <div class="panel-title">Markdown Editor（语雀风格）</div>
          <button id="clearMarkdownInputBtn" class="btn btn-light" type="button">清空输入</button>
        </header>
        <div class="md-input-wrap">
          <div class="md-toolbar">
            <button class="md-tool-btn" data-insert="# " type="button">H1</button>
            <button class="md-tool-btn" data-insert="## " type="button">H2</button>
            <button class="md-tool-btn" data-insert="**加粗**" type="button">粗体</button>
            <button class="md-tool-btn" data-insert="*斜体*" type="button">斜体</button>
            <button class="md-tool-btn" data-insert="- 列表项" type="button">列表</button>
            <button class="md-tool-btn" data-insert="> 引用" type="button">引用</button>
            <button class="md-tool-btn" data-insert="\n```js\nconsole.log('hello');\n```\n" type="button">代码块</button>
            <button class="md-tool-btn" data-insert="[链接文本](https://example.com)" type="button">链接</button>
            <button class="md-tool-btn" data-insert="\n| 列1 | 列2 |\n| --- | --- |\n| 内容A | 内容B |\n" type="button">表格</button>
          </div>
          <textarea id="markdownInput" spellcheck="false"></textarea>
        </div>
      </article>

      <article class="panel">
        <header class="panel-header">
          <div class="panel-title">Rich Text Output</div>
          <button id="copyRichHtmlBtn" class="btn" type="button">复制富文本HTML</button>
        </header>
        <div class="rich-wrap">
          <div id="richOutputEditor" contenteditable="true"></div>
        </div>
      </article>
    </section>
    <p class="tip">当前为 Markdown 转富文本页面，点击上方切换可跳到富文本转 Markdown 页面。</p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/lib/marked.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script>
    const markdownInput = document.querySelector("#markdownInput");
    const richOutputEditor = document.querySelector("#richOutputEditor");
    const copyRichHtmlBtn = document.querySelector("#copyRichHtmlBtn");
    const clearMarkdownInputBtn = document.querySelector("#clearMarkdownInputBtn");

    marked.setOptions({
      gfm: true,
      tables: true,
      breaks: false
    });

    function markdownToRichText() {
      const md = markdownInput.value;
      const renderedHtml = marked.parse(md || "");
      const safeHtml = DOMPurify.sanitize(renderedHtml, {
        USE_PROFILES: { html: true }
      });
      richOutputEditor.innerHTML = safeHtml || "<p><br></p>";
    }

    async function copyText(text, button) {
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
        const oldText = button.textContent;
        button.textContent = "已复制";
        setTimeout(() => { button.textContent = oldText; }, 1200);
      } catch (error) {
        alert("复制失败，请检查浏览器权限后重试");
        console.error(error);
      }
    }

    markdownInput.addEventListener("input", markdownToRichText);

    copyRichHtmlBtn.addEventListener("click", function () {
      copyText(richOutputEditor.innerHTML, copyRichHtmlBtn);
    });

    clearMarkdownInputBtn.addEventListener("click", function () {
      markdownInput.value = "";
      markdownToRichText();
    });

    document.querySelectorAll(".md-tool-btn").forEach((toolBtn) => {
      toolBtn.addEventListener("click", function () {
        const snippet = toolBtn.dataset.insert || "";
        const start = markdownInput.selectionStart;
        const end = markdownInput.selectionEnd;
        const before = markdownInput.value.slice(0, start);
        const selected = markdownInput.value.slice(start, end);
        const after = markdownInput.value.slice(end);
        const injected = snippet.includes("加粗") || snippet.includes("斜体")
          ? snippet.replace("加粗", selected || "加粗文本").replace("斜体", selected || "斜体文本")
          : (selected ? snippet + "\n" + selected : snippet);
        markdownInput.value = before + injected + after;
        const cursor = (before + injected).length;
        markdownInput.focus();
        markdownInput.setSelectionRange(cursor, cursor);
        markdownToRichText();
      });
    });

    markdownInput.value = `# Markdown 转富文本示例

这是一个语雀风格的双栏编辑区，左侧写 Markdown，右侧自动转为富文本。

## 功能
- 实时渲染
- 支持表格、代码块、引用
- 转换后可继续在右侧编辑

| 字段 | 说明 |
| --- | --- |
| code | 行内代码如 \`test(123)\` |
| table | 表格会保留渲染 |
`;
    markdownToRichText();
  </script>
</body>
</html>
