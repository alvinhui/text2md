<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>富文本 -> Markdown</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css"
  />
  <style>
    :root {
      --bg: #f2f4f8;
      --panel-bg: #ffffff;
      --text: #262626;
      --subtext: #6b7280;
      --border: #e6e8eb;
      --primary: #2f6bff;
      --primary-hover: #2458d9;
      --radius: 10px;
      --shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .container {
      width: min(1360px, calc(100vw - 28px));
      margin: 14px auto 24px;
    }

    h1 {
      margin: 0 0 12px;
      text-align: center;
      font-size: clamp(20px, 2.1vw, 30px);
      font-weight: 600;
      color: #1f2937;
    }

    .mode-switch {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 0 0 12px;
    }

    .mode-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border: 1px solid #d8dde8;
      background: #f6f7fa;
      color: #4b5563;
      border-radius: 999px;
      height: 34px;
      padding: 0 16px;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .mode-btn:hover { background: #eceff5; }
    .mode-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      box-shadow: 0 2px 8px rgba(47, 107, 255, 0.25);
    }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .panel {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      height: 44px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px 0 12px;
      background: #fafbfc;
    }

    .panel-title {
      font-size: 13px;
      color: var(--subtext);
      font-weight: 500;
    }

    .btn {
      border: 1px solid transparent;
      border-radius: 7px;
      background: var(--primary);
      color: #fff;
      font-size: 12px;
      line-height: 28px;
      height: 28px;
      padding: 0 10px;
      cursor: pointer;
    }

    .btn:hover { background: var(--primary-hover); }

    .editor-wrap, .markdown-wrap {
      height: min(74vh, 760px);
    }

    #editor { height: calc(100% - 42px); }

    #editor .ql-toolbar.ql-snow {
      border: 0;
      border-bottom: 1px solid var(--border);
      background: #fff;
      padding: 7px 8px;
    }

    #editor .ql-container.ql-snow { border: 0; }

    #editor .ql-editor {
      font-size: 15px;
      line-height: 1.9;
      padding: 18px 22px;
      max-width: 860px;
      margin: 0 auto;
    }

    #markdownOutput {
      margin: 0;
      width: 100%;
      height: 100%;
      border: 0;
      outline: none;
      resize: none;
      padding: 18px 20px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
        "Liberation Mono", "Courier New", monospace;
      font-size: 14px;
      line-height: 1.8;
      background: #fff;
      color: #111827;
      overflow: auto;
      white-space: pre;
    }

    .tip {
      margin-top: 8px;
      text-align: center;
      color: #98a1b2;
      font-size: 12px;
    }

    @media (max-width: 980px) {
      .panels { grid-template-columns: 1fr; }
      .editor-wrap, .markdown-wrap { height: 48vh; }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>富文本与Markdown在线双向转换工具</h1>
    <div class="mode-switch">
      <a class="mode-btn active" href="./rt2md.html">富文本 -> Markdown</a>
      <a class="mode-btn" href="./md2rt.html">Markdown -> 富文本</a>
    </div>

    <section class="panels">
      <article class="panel">
        <header class="panel-header">
          <div class="panel-title">Rich Text Editor</div>
          <button id="copyRichBtn" class="btn" type="button">清空并复制文本</button>
        </header>
        <div class="editor-wrap">
          <div id="editor"></div>
        </div>
      </article>

      <article class="panel">
        <header class="panel-header">
          <div class="panel-title">Markdown Output</div>
          <button id="copyMarkdownBtn" class="btn" type="button">复制Markdown源码</button>
        </header>
        <div class="markdown-wrap">
          <textarea id="markdownOutput" spellcheck="false"></textarea>
        </div>
      </article>
    </section>
    <p class="tip">当前为富文本转 Markdown 页面，点击上方切换可跳到 Markdown 转富文本页面。</p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/turndown@7.2.0/dist/turndown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/turndown-plugin-gfm@1.0.2/dist/turndown-plugin-gfm.js"></script>
  <script>
    const quill = new Quill("#editor", {
      theme: "snow",
      placeholder: "请粘贴或编辑富文本内容...",
      modules: {
        toolbar: [
          [{ header: [1, 2, 3, false] }],
          ["bold", "italic", "underline", "strike"],
          [{ list: "ordered" }, { list: "bullet" }],
          [{ indent: "-1" }, { indent: "+1" }],
          ["blockquote", "code-block"],
          ["link", "image"],
          ["clean"]
        ]
      }
    });

    const markdownOutput = document.querySelector("#markdownOutput");
    const copyRichBtn = document.querySelector("#copyRichBtn");
    const copyMarkdownBtn = document.querySelector("#copyMarkdownBtn");

    const turndownService = new TurndownService({
      headingStyle: "atx",
      hr: "---",
      bulletListMarker: "-",
      codeBlockStyle: "fenced"
    });
    turndownService.use(window.turndownPluginGfm.gfm);

    function toMarkdown() {
      const html = quill.root.innerHTML;
      markdownOutput.value = turndownService.turndown(html).trim();
    }

    function fallbackCopyText(text) {
      const textArea = document.createElement("textarea");
      textArea.value = text;
      textArea.setAttribute("readonly", "");
      textArea.style.position = "fixed";
      textArea.style.opacity = "0";
      textArea.style.pointerEvents = "none";
      document.body.appendChild(textArea);
      textArea.select();
      textArea.setSelectionRange(0, text.length);
      const copied = document.execCommand("copy");
      document.body.removeChild(textArea);
      return copied;
    }

    async function copyText(text, button) {
      if (!text) return;
      let copied = false;
      try {
        if (window.isSecureContext && navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
          copied = true;
        } else {
          copied = fallbackCopyText(text);
        }
      } catch (error) {
        copied = fallbackCopyText(text);
        if (!copied) {
          console.error(error);
        }
      }

      if (!copied) {
        alert("复制失败，请检查浏览器权限后重试");
        return;
      }

      const oldText = button.textContent;
      button.textContent = "已复制";
      setTimeout(() => { button.textContent = oldText; }, 1200);
    }

    quill.on("text-change", toMarkdown);

    copyMarkdownBtn.addEventListener("click", function () {
      copyText(markdownOutput.value, copyMarkdownBtn);
    });

    copyRichBtn.addEventListener("click", async function () {
      const plainText = quill.getText().trim();
      await copyText(plainText, copyRichBtn);
      quill.setText("");
      toMarkdown();
    });

    quill.clipboard.dangerouslyPasteHTML(`
      <h2>2.1 网络耗时</h2>
      <h3>2.1.1 请求发出前（客户端→Node）</h3>
      <ul>
        <li>DNS 解析：50~200ms（已缓存更快）</li>
        <li>TCP/TLS 建连：100~400ms（跨地域更慢）</li>
      </ul>
    `);
    toMarkdown();
  </script>
</body>
</html>
